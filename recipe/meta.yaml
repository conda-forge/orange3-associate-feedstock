{% set name = "Orange3-Associate" %}
{% set version = "1.4.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name | replace('-', '_') | lower }}-{{ version }}.tar.gz
  sha256: 7c34f7ac6ddc2f66fa2ee91b017d5eb8a1e1f08eca9a790ea82ca5e7ed98b38d

build:
  number: 0
  script: "{{ PYTHON }} -m pip install . -vv"
  skip: true  # [py<39]

requirements:
  build:
    - {{ compiler('cxx') }}
    - {{ stdlib("c") }}
  host:
    - python
    - pip
    - setuptools
    - cython
  run:
    - python
    - numpy >=1.24.0
    - scipy >=1.10.0
    - Orange3 >=3.38.0

test:
  imports:
    - orangecontrib.associate

about:
  home: http://orange.biolab.si/
  license: GPL-3.0-only
  license_family: GPL
  license_file: LICENSE
  summary: 'Frequent itemsets and association rules mining for Orange 3'
  description: |
    Orange add-on for enumerating frequent itemsets and association rules mining
  doc_url: https://orange3-associate.readthedocs.io/
  dev_url: https://github.com/biolab/orange3-associate

extra:
  recipe-maintainers:
    - primozgodec
    - markotoplak
    - ajdapretnar
    - JakaKokosar
